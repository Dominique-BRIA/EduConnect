version: "3.9"

services:

  # ── MySQL ────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: educonnect_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-hackaton_db}
      MYSQL_USER:          ${MYSQL_USER:-educonnect}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-edupass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - educonnect_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend Spring Boot ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: educonnect_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-hackaton_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-educonnect}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-edupass}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      APP_JWT_SECRET:             ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      APP_JWT_EXPIRATION:         ${JWT_EXPIRATION:-900000}
      APP_JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      SPRING_PROFILES_ACTIVE:     ${SPRING_PROFILE:-prod}
    ports:
      - "8080:8080"
    networks:
      - educonnect_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── Frontend React + Nginx ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: educonnect_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - educonnect_net

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local

# ── Réseau ───────────────────────────────────────────────────────────────────
networks:
  educonnect_net:
    driver: bridge
