version: "3.9"

# Usage : docker-compose -f docker-compose.dev.yml up
# Démarre uniquement MySQL (le backend et frontend tournent en local)

services:

  mysql:
    image: mysql:8.0
    container_name: educonnect_mysql_dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE:      hackaton_db
      MYSQL_USER:          educonnect
      MYSQL_PASSWORD:      edupass
    ports:
      - "3306:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    networks:
      - educonnect_dev

  # phpMyAdmin optionnel pour gérer la base visuellement
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: educonnect_phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST:     mysql
      PMA_PORT:     3306
      PMA_USER:     root
      PMA_PASSWORD: root
    ports:
      - "8081:80"
    networks:
      - educonnect_dev

volumes:
  mysql_dev_data:

networks:
  educonnect_dev:
    driver: bridge
